<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thermal Receipt Demo - HAIRSKIIN</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px 20px;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .demo-container {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 400px;
        }

        .demo-title {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        .demo-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-print {
            background: #4CAF50;
            color: white;
        }

        .btn-print:hover {
            background: #45a049;
            transform: translateY(-2px);
        }

        .thermal-receipt {
            background: #ffffff;
            width: 58mm;
            max-width: 58mm;
            padding: 4mm;
            margin: 0 auto;
            font-family: "Courier New", Courier, monospace;
            color: #000000;
            font-size: 11px;
            font-weight: 600;
            line-height: 1.4;
            border: 1px solid #e5e5e5;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            text-align: left;
            overflow-wrap: break-word;
            word-wrap: break-word;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 8px;
            margin-top: 4px;
        }

        .receipt-logo {
            width: 50px;
            height: 50px;
            margin-bottom: 6px;
            object-fit: contain;
        }

        .thermal-receipt * {
            font-family: "Courier New", Courier, monospace;
        }

        .thermal-header {
            text-align: center;
            margin-bottom: 8px;
        }

        .thermal-header {
            text-align: center;
            margin-bottom: 8px;
        }

        .shop-name {
            font-size: 20px;
            font-weight: 900;
            letter-spacing: 3px;
            margin: 0 0 6px 0;
            text-transform: uppercase;
        }

        .contact-info {
            font-size: 9px;
            margin: 4px 0;
            line-height: 1.5;
            text-align: center;
            font-weight: 600;
        }

        .divider {
            border-top: 2px solid #000;
            margin: 8px 0;
        }

        .dashed-divider {
            border-top: 2px dashed #000;
            margin: 8px 0;
        }

        .bill-info {
            text-align: center;
            font-size: 10px;
            margin: 6px 0;
            font-weight: 700;
        }

        .bill-number {
            font-weight: 900;
            margin: 3px 0;
            font-size: 11px;
        }

        .receptionist {
            font-size: 9px;
            margin: 3px 0;
            font-weight: 600;
        }

        .items-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 8px;
            font-size: 10px;
            font-weight: 700;
        }

        .items-table th {
            text-align: left;
            font-weight: 900;
            padding: 4px 0;
            border-bottom: 2px solid #000;
            font-size: 11px;
        }

        .items-table th:nth-child(2) {
            text-align: center;
            width: 15%;
        }

        .items-table th:nth-child(3) {
            text-align: right;
            width: 30%;
        }

        .items-table td {
            padding: 4px 0;
            font-size: 10px;
            font-weight: 700;
        }

        .items-table td:first-child {
            padding-right: 6px;
            word-wrap: break-word;
        }

        .items-table td:nth-child(2) {
            text-align: center;
        }

        .items-table td:nth-child(3) {
            text-align: right;
        }

        .totals-section {
            border-top: 2px solid #000;
            padding-top: 8px;
            margin-top: 8px;
            font-size: 11px;
            font-weight: 700;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            margin: 4px 0;
        }

        .grand-total {
            display: flex;
            justify-content: space-between;
            font-weight: 900;
            font-size: 16px;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 3px double #000;
        }

        .footer {
            text-align: center;
            margin-top: 12px;
            font-size: 13px;
            font-weight: 900;
            letter-spacing: 4px;
        }

        @media print {
            body {
                background: white;
                padding: 0;
            }

            .demo-container {
                box-shadow: none;
                padding: 0;
                border-radius: 0;
            }

            .demo-title,
            .demo-buttons {
                display: none;
            }

            .thermal-receipt {
                border: none;
                box-shadow: none;
                margin: 0;
            }

            @page {
                size: 58mm auto;
                margin: 0;
            }
        }
    </style>
</head>
<body>
    <div class="demo-container">
        <h2 class="demo-title">Thermal Receipt Preview</h2>
        <div class="demo-buttons">
            <button class="btn btn-print" onclick="window.print()">🖨️ Print Receipt</button>
        </div>

        <div class="thermal-receipt">
            <div class="logo-container">
                <svg class="receipt-logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="45" fill="#000" stroke="#000" stroke-width="2"/>
                    <text x="50" y="60" font-size="40" font-weight="bold" fill="#fff" text-anchor="middle" font-family="Arial, sans-serif">HS</text>
                </svg>
            </div>

            <div class="thermal-header">
                <div class="shop-name">HAIRSKIIN</div>
            </div>

            <div class="contact-info">
                <div>2nd No. 10, Shady Grove Ave</div>
                <div>Borella</div>
                <div>0112688449 | 0772008802</div>
            </div>

            <div class="divider"></div>

            <div class="bill-info">
                <div class="bill-number">Bill No: #008309/02/26</div>
                <div class="receptionist">Receptionist: dfgr</div>
            </div>

            <div class="dashed-divider"></div>

            <table class="items-table">
                <thead>
                    <tr>
                        <th>Item</th>
                        <th>Qty</th>
                        <th>Price</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>fgg</td>
                        <td>1</td>
                        <td>3434.00</td>
                    </tr>
                </tbody>
            </table>

            <div class="totals-section">
                <div class="total-row">
                    <span>Subtotal:</span>
                    <span>3434.00</span>
                </div>
                <div class="total-row">
                    <span>Discount:</span>
                    <span>-34.00</span>
                </div>
            </div>

            <div class="grand-total">
                <span>TOTAL:</span>
                <span>Rs. 3400.00</span>
            </div>

            <div class="footer">
                <div>THANK YOU</div>
            </div>
        </div>
    </div>
</body>
</html>
